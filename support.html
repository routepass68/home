<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoutePass Support</title>
  <style>
    :root{--bg:#e9e9e9;--card:#fff;--text:#1f2937;--muted:#6b7280;--brand:#0f5f8f;--brand2:#2d8ac7;--shadow:0 12px 32px rgba(0,0,0,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:920px;margin:36px auto;padding:24px}.card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:34px}
    h1{margin-top:0} p,li{line-height:1.65} a{color:var(--brand);text-decoration:none}
    .cta{margin-top:20px;padding:18px;border-radius:18px;background:linear-gradient(135deg,#eef7fd,#f8fbff)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <a href="index.html">Back to Home</a>
      <h1>Support</h1>
      <p>For help with RoutePass, account questions, event issues, or data deletion requests, contact:</p>
      <div class="cta">
        <p><strong>YOUR_EMAIL@example.com</strong></p>
      </div>
      <p>Typical topics:</p>
      <ul>
        <li>Login issues</li>
        <li>Checkpoint validation questions</li>
        <li>Event administration support</li>
        <li>Privacy and data deletion requests</li>
      </ul>
    </div>
  </div>
</body>
</html>
